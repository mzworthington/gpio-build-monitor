name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Bootstrap
        run: make bootstrap

      - name: Test
        run: make test

      - name: Publish Test Report
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: junit/test-results.xml
          github_token: ${{ secrets.GITHUB_TOKEN }}

  release:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect application changes since last release
        id: changes
        run: |
          git fetch --tags --force
          if ! git describe --tags --match 'v*' --abbrev=0 >/dev/null 2>&1; then
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "No previous release tag found; release required."
            exit 0
          fi

          last_tag="$(git describe --tags --match 'v*' --abbrev=0)"
          if git diff --quiet "${last_tag}" HEAD -- monitor/ pyproject.toml; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "No application changes since ${last_tag}."
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "Application changes detected since ${last_tag}."
          fi

      - name: Install mise
        if: steps.changes.outputs.release == 'true'
        uses: jdx/mise-action@v4

      - name: Bootstrap
        if: steps.changes.outputs.release == 'true'
        run: make bootstrap

      - name: Release
        if: steps.changes.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export PATH="$PWD/.venv/bin:$PATH"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git describe --tags --match 'v*' >/dev/null 2>&1; then
            VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
            git tag "v${VERSION}"
            echo "Seeded baseline tag v${VERSION} from pyproject.toml"
          fi
          if .venv/bin/semantic-release version --print --no-changelog 2>&1 | grep -q "No release will be made"; then
            .venv/bin/semantic-release version --patch --no-changelog
          else
            .venv/bin/semantic-release version --no-changelog
          fi
